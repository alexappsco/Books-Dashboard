<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مقال جديد - Youni</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .header-bg { background: rgba(136, 108, 232, 1); }
        .active-link { background: rgba(136, 108, 232, 0.3); font-weight: 700; }
        .nav-link { font-size: 14px; font-weight: 500; transition: all 0.3s; }
    </style>
</head>
<body class="bg-[#F4F6F8]">

    <header class="header-bg h-16 w-full flex items-center justify-between px-4 md:px-8 fixed top-0 z-[100]">
        <div class="flex items-center"><img src="imgs/logoHeader.png" alt="Youni" class="h-8 md:h-10"></div>
        <div class="flex items-center gap-4 text-white">
            <div class="flex items-center gap-4 border-l pl-4 border-white/20">
                <div class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden"><img src="https://ui-avatars.com/api/?name=User" alt=""></div>
                <span class="hidden md:block text-sm font-medium">اسم المستخدم</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-white"><svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        </div>
    </header>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[80] hidden"></div>

    <div class="flex pt-16">
        <aside id="sidebar" class="w-64 h-[calc(100vh-64px)] fixed right-0 top-16 z-[90] overflow-y-auto transition-transform duration-300 md:translate-x-0 translate-x-full shadow-2xl md:shadow-none bg-white md:bg-[rgba(136,108,232,0.1)]">
            <nav id="sidebar-nav" class="mt-6 px-4 space-y-1"></nav>
        </aside>

        <main class="flex-1 md:mr-64 p-4 md:p-8 min-h-screen w-full">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
                <h1 class="text-[28px] font-bold text-gray-800">إنشاء مقال جديد</h1>
                <div class="flex items-center gap-3">
                    <a href="articles-management.html" class="h-12 px-6 rounded-xl border border-gray-300 text-gray-600 font-semibold flex items-center hover:bg-white transition">إلغاء</a>
                    <button class="h-12 px-6 rounded-xl border border-[#886CE8] text-[#886CE8] font-semibold hover:bg-purple-50 transition">حفظ المسودة</button>
                    <button class="h-12 px-6 rounded-xl bg-[#886CE8] text-white font-semibold hover:bg-[#7758E6] transition shadow-md">نشر المقال</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 space-y-6">
                <div>
                    <label class="block text-[15px] font-semibold text-gray-800 mb-2 text-right">عنوان المقال</label>
                    <input type="text" placeholder="اكتب عنوان المقال هنا..." class="w-full h-[52px] rounded-xl border border-gray-200 px-4 text-right text-[15px] focus:outline-none focus:ring-2 focus:ring-[#886CE8]/20 focus:border-[#886CE8]">
                </div>

                <div>
                    <label class="block text-[15px] font-semibold text-gray-800 mb-2 text-right">محتوى المقال</label>
                    <div class="rounded-xl border border-gray-200 overflow-hidden">
                        <div id="editorArWrap"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-[15px] font-semibold text-gray-800 mb-3 text-right">إرفاق الصورة</label>
                    <label class="w-full rounded-[20px] border border-dashed border-gray-300 bg-gray-50 min-h-[200px] flex flex-col items-center justify-center text-center cursor-pointer hover:bg-gray-100 transition px-6 py-8">
                        <input type="file" class="hidden" accept="image/*">
                        <img src="imgs/icons/file.svg" alt="upload" class="w-[120px] mb-4">
                        <h3 class="text-[17px] font-bold text-gray-800 mb-1">اختر الصورة</h3>
                        <p class="text-gray-500 text-sm">اسحب وأفلت الملفات هنا أو <span class="text-[#2065D1]">تصفح البيانات</span></p>
                    </label>
                </div>
            </div>
        </main>
    </div><script src="js/rich-editor.js"></script>
    <script>initEditor('editorAr', 'rtl');</script>
    <script src="js/legal-nav.js"></script>
    <script src="js/render-sidebar.js"></script>
    <script>renderSidebar('articles');</script>
</body>
</html>
