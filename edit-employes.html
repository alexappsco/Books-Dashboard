<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Youni</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .sidebar-bg { background: rgba(136, 108, 232, 0.1); }
        .header-bg { background: rgba(136, 108, 232, 1); }
        .active-link { background: rgba(136, 108, 232, 0.3); font-weight: 700; }
        .nav-link { font-size: 14px; font-weight: 500; transition: all 0.3s; }
        
        .dropdown-actions { 
            display: none; 
            position: absolute; 
            left: 0; 
            top: 40px; 
            z-index: 9999; 
            min-width: 140px; 
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
            border-radius: 12px;
        }
        .dropdown-actions.show { display: block; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="header-bg h-16 w-full flex items-center justify-between px-4 md:px-8 fixed top-0 z-[100]">
        <div class="flex items-center">
            <img src="imgs/logoHeader.png" alt="Youni" class="h-8 md:h-10 brightness-1 ">
        </div>

        <div class="flex items-center gap-4 text-white">
            <div class="flex items-center gap-4 border-l pl-4 border-white/20">
                <div class="relative cursor-pointer">
                    <span class="absolute -top-1 -right-1 bg-red-500 text-[10px] rounded-full px-1">1</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=User" alt="">
                    </div>
                    <span class="hidden md:block text-sm font-medium">اسم المستخدم</span>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-white outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </header>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[80] hidden"></div>

    <div class="flex pt-16">
<aside id="sidebar" class="w-64 h-[calc(100vh-64px)] fixed right-0 top-16 z-[90] overflow-y-auto transition-transform duration-300 md:translate-x-0 translate-x-full shadow-2xl md:shadow-none bg-white md:bg-[rgba(136,108,232,0.1)]">
        <nav id="sidebar-nav" class="mt-6 px-4 space-y-1"></nav>
        </aside>

     <main class="flex-1 md:mr-64 p-4 md:p-8 min-h-screen bg-[#F9F9F9]" dir="rtl">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-medium text-[#1D1D1D]">تعديل موظف</h1>
        <div class="flex gap-4">
            <button onclick="window.location.href='managementemployes.html'" class="px-8 py-2 border border-[#FF4D4D] text-[#FF4D4D] rounded-lg hover:bg-red-50 transition-colors">
                إلغاء
            </button>
            <button  onclick="window.location.href='managementemployes.html'" class="px-8 py-2 bg-[#886CE8] text-white rounded-lg hover:bg-[#765bc7] transition-colors shadow-sm">
                تعديل
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-50 space-y-6">
            <div>
                <label class="block text-[#1D1D1D] mb-2 font-normal">الاسم</label>
                <input type="text" value="أحمد محمد " class="w-full p-3 bg-[#F2F4F7] text-gray-400 border-none rounded-xl focus:ring-2 focus:ring-[#886CE8] outline-none">
            </div>

            <div>
                <label class="block text-[#1D1D1D] mb-2 font-normal">رقم الهاتف</label>
                <input type="text" value="+966 50 123 4567" class="w-full p-3 bg-[#F2F4F7] text-gray-400 border-none rounded-xl focus:ring-2 focus:ring-[#886CE8] outline-none text-right" >
            </div>

            <div>
                <label class="block text-[#1D1D1D] mb-2 font-normal">البريد الالكتروني</label>
                <input type="email" value="ahmed.ali@example.com" class="w-full p-3 bg-[#F2F4F7] text-gray-400 border-none rounded-xl focus:ring-2 focus:ring-[#886CE8] outline-none">
            </div>

            <div>
                <label class="block text-[#1D1D1D] mb-2 font-normal">الفرع</label>
                <div class="relative">
                    <select class="w-full text-gray-400 p-3 bg-[#F2F4F7] border-none rounded-xl appearance-none focus:ring-2 focus:ring-[#886CE8] outline-none ">
                        <option value="1" selected class="text-gray-700">الفرع الرئيسي - الرياض</option>
                        <option value="2" class="text-gray-700">فرع جدة</option>
                        <option value="3" class="text-gray-700">فرع الدمام</option>
                    </select>
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-8 pt-4">
                <span class="text-[#1D1D1D] font-medium">الحالة</span>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-600 font-normal">تفعيل</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-[-100%] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#22C55E]"></div>
                    </label>
                </div>
            </div>
        </div>

        <div class="space-y-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-50">
                <p class="mb-6 font-normal text-[#1D1D1D]">الصورة</p>

                <div class="flex flex-col items-center">
                    <div class="w-36 h-36 rounded-full border-2 border-dashed border-[#886CE8] flex items-center justify-center p-1 relative group">
                        <div class="w-32 h-32 rounded-full overflow-hidden bg-gray-50 cursor-pointer relative">
                            <img src="https://ui-avatars.com/api/?name=Ahmed+Ali&background=886CE8&color=fff&size=128" 
                                 class="w-full h-full object-cover" 
                                 alt="صورة الموظف">
                            <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-[10px] text-white">تعديل الصورة</span>
                            </div>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400 mt-3 font-light">أنقر لتحديث الصورة</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-50">
                <p class="mb-4 font-normal text-[#1D1D1D]">الدور</p>

                <div class="bg-[#F2F4F7] rounded-xl overflow-hidden">
                    <button onclick="toggleRolesDropdown()" class="w-full p-3 flex justify-between items-center text-gray-700 cursor-pointer">
                        <span class="font-medium text-sm">أمين مستودع (الدور الحالي)</span>
                        <svg id="rolesArrow" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    <div
            id="rolesDropdown"
            class="hidden border-t border-gray-200 font-semibold"
        >

            <!-- Scroll Area -->
            <div class="max-h-[260px] overflow-y-auto">

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>خدمة عملاء</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>أمين مستودع</span>
                    <input type="checkbox"
                    checked
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>موظف مبيعات</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>محاسب</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>مدير فرع</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>كاشير</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>مشرف عمليات</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

                <label class="flex items-center justify-between p-3 hover:bg-gray-100 cursor-pointer">
                    <span>مندوب توصيل</span>
                    <input type="checkbox"
                        class="w-5 h-5 border-2 border-gray-300 rounded accent-[#886CE8]">
                </label>

            </div>

            <!-- Footer -->
            <div class="p-3 border-t border-gray-200">
                <button class="flex items-center gap-2 text-[rgba(0,115,230,1)] font-medium text-sm">
                    <span>
                        <img src="imgs/icons/plus.svg" alt="">
                    </span>

                    <span>مخصص</span>
                </button>
            </div>

        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 flex justify-end">
        <button onclick="window.location.href='custom-employe.html'" class="bg-[rgba(255,255,255,1)] px-6 py-2 rounded-lg flex items-center gap-2 shadow-sm hover:bg-gray-50 transition-colors">
            <span class="text-[#1D1D1D] font-bold">التالي</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
    </div>
</main>

<script>
    function toggleRolesDropdown() {
        const dropdown = document.getElementById("rolesDropdown");
        const arrow = document.getElementById("rolesArrow");
        dropdown.classList.toggle("hidden");
        arrow.classList.toggle("rotate-180");
    }
</script>
    </div>

    <!-- LOGOUT MODAL -->
<div
    id="logoutModal"
    class="fixed inset-0 z-[999999] hidden bg-black/40 backdrop-blur-[2px] items-center justify-center p-4 overflow-y-auto"
>

    <!-- MODAL BOX -->
    <div
        class="relative bg-white w-full max-w-[520px]
        rounded-[28px] sm:rounded-[36px]
        px-5 sm:px-8 py-8 sm:py-10 shadow-2xl"
    >

        <!-- CLOSE -->
        <button
            onclick="closeLogoutModal()"
            class="absolute top-5 left-5 text-[#667085] hover:opacity-70 transition"
        >

            <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 6L18 18M6 18L18 6"
                />
            </svg>

        </button>

        <!-- CONTENT -->
        <div class="flex flex-col items-center text-center">

            <!-- ICON -->
            <div
                class="w-[90px] h-[90px] sm:w-[110px] sm:h-[110px]
                rounded-[24px]
                bg-[#F3F4F6]
                flex items-center justify-center mb-8"
            >

                <img
                    src="imgs/icons/out.svg"
                    alt="logout"
                    class="w-12 h-12 sm:w-14 sm:h-14"
                >

            </div>

            <!-- TITLE -->
            <h2
                class="text-[20px] 
                font-bold text-[#1F2937]
                leading-relaxed mb-10"
            >
                هل أنت متأكد أنك تريد تسجيل الخروج؟
            </h2>

            <!-- BUTTONS -->
            <div
                class="w-full flex flex-col-reverse sm:flex-row items-stretch sm:items-center justify-center gap-4"
            >
                <!-- CONFIRM -->
                <button
                    class="h-[56px] flex-1 rounded-2xl bg-[#D91E18] text-white text-[16px] font-bold hover:bg-[#BF1611] transition"
                >
                    نعم
                </button>
                 <!-- CANCEL -->
                <button
                    onclick="closeLogoutModal()"
                    class="h-[56px] flex-1 rounded-2xl border-2 border-[#64748B] text-[#64748B] text-[16px] font-bold hover:bg-[#F8FAFC] transition"
                >
                    إلغاء
                </button>
            </div>

        </div>

    </div>

</div>
    <script src="js/legal-nav.js"></script>
    <script src="js/render-sidebar.js"></script>
    <script>renderSidebar('employees');</script>
</body>
</html>
