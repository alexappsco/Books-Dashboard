<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Youni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: rgba(237, 233, 251, 1);
        }

        .form-bg {
            background-color: rgba(136, 108, 232, 1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center overflow-x-hidden">

    <div class="flex flex-col md:flex-row w-full min-h-screen items-center">
        
        <div class="w-full md:w-1/2 min-h-screen form-bg flex items-center justify-center relative order-2 md:order-1 rounded-b-[50px] md:rounded-b-none md:rounded-l-[45%]">
            
            <div class="w-full max-w-md px-8 py-12 text-white z-10">

                <h1 class="text-3xl md:text-4xl font-bold text-center mb-10">
                  نسيت كلمة المرور
                </h1>
                
                <form class="space-y-6">

                    <div>
                        <label class="block text-sm mb-2 text-right font-bold">
                            البريد الالكتروني
                        </label>

                        <input 
                            type="email" 
                            placeholder="example@gmail.com" 
                            class="w-full p-4 rounded-xl text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-300 text-left"
                        >
                        <div class=" ">
                            <a href="#" class="text-xs underline">
                              سيتم ارسال رمز تأكيدي الى عنوان البريد لاتمام عملية التسجيل
                            </a>
                        </div>
                    </div>
                    
                    <button 
    type="button"
    onclick="window.location.href='otp.html'"
    class="w-full bg-[#ebedef] text-gray-800 font-medium py-4 rounded-xl shadow-lg hover:bg-gray-200 transition-colors mt-8"
>
    تسجيل الدخول
</button>

                </form>

            </div>

        </div>

        <div class="w-full md:w-1/2 flex justify-center items-center p-10 order-1 md:order-2">

            <img 
                src="imgs/logoyouni.png" 
                alt="Youni Logo" 
                class="w-64 md:w-96 object-contain"
            >

        </div>

    </div>

</body>
</html>
