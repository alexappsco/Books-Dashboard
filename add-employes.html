            position: absolute;

            border-radius: 12px;

                  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-50">

<script>
    function toggleRolesDropdown() {
        const dropdown = document.getElementById("rolesDropdown");
        const arrow = document.getElementById("rolesArrow");

        dropdown.classList.toggle("hidden");
        arrow.classList.toggle("rotate-180");
    }
</script>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        }

        function toggleActions(event) {
            event.stopPropagation();
            const allMenus = document.querySelectorAll('.dropdown-actions');
            const currentMenu = event.currentTarget.nextElementSibling;
            
            allMenus.forEach(menu => {
                if(menu !== currentMenu) menu.classList.remove('show');
            });
            currentMenu.classList.toggle('show');
        }

        window.onclick = function() {
            document.querySelectorAll('.dropdown-actions').forEach(menu => menu.classList.remove('show'));
        }
    </script>
