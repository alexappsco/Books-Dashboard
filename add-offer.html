      <main class="flex-1 md:mr-64 p-4 md:p-8 min-h-screen w-full overflow-x-hidden bg-[#F4F6F8]">

    <!-- Content -->

            <h2 class="text-[24px] font-bold text-[#1F2937] mb-6">

                    <label class="block text-[15px] font-medium text-[#1F2937] mb-2">
                        الاسم باللغة الانجليزية
                    </label>

                    <input
                        type="text"
                        placeholder="اكتب الاسم باللغة الانجليزية"

                    >

                <!-- Description -->

                    <label class="block text-[15px] font-medium text-[#1F2937] mb-2">
                        وصف العرض
                    </label>

                    <textarea

                </div>

                <!-- Description EN -->

                    <label class="block text-[15px] font-medium text-[#1F2937] mb-2">
                        وصف العرض بالانجليزية
                    </label>

                    <textarea
                        placeholder="وصف العرض بالانجليزية"
                        class="w-full h-[120px] rounded-xl border border-[#D0D5DD] p-4 text-[15px] resize-none outline-none focus:border-[#886CE8]"

                <!-- Select -->

                    <label class="block text-[15px] font-medium text-[#1F2937] mb-2">

                            <path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm0 2h12v6l-2.5-2.5-3 3L8 9 4 13V5z"/>
                        </svg>

                    </div>

                    <div class="relative w-[90px] h-[90px] rounded-2xl border border-[#E5E7EB] bg-[#F8F8F8] flex items-center justify-center shadow-sm">

                        <button class="absolute top-2 left-2 text-red-500">
                            <img src="/imgs/icons/trach.svg" alt="">
                        </button>

                        <svg class="w-8 h-8 text-gray-300" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm0 2h12v6l-2.5-2.5-3 3L8 9 4 13V5z"/>
                        </svg>

                    </div>

                    <div class="relative w-[90px] h-[90px] rounded-2xl border border-[#E5E7EB] bg-[#F8F8F8] flex items-center justify-center shadow-sm">

                        <button class="absolute top-2 left-2 text-red-500">

</main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        }

        function toggleActions(event) {
            event.stopPropagation();
            const allMenus = document.querySelectorAll('.dropdown-actions');
            const currentMenu = event.currentTarget.nextElementSibling;
            
            allMenus.forEach(menu => {
                if(menu !== currentMenu) menu.classList.remove('show');
            });
            currentMenu.classList.toggle('show');
        }

        window.onclick = function() {
            document.querySelectorAll('.dropdown-actions').forEach(menu => menu.classList.remove('show'));
        }
    </script>

<!-- LOGOUT MODAL -->
<div
    id="logoutModal"
    class="fixed inset-0 z-[999999] hidden bg-black/40 backdrop-blur-[2px] items-center justify-center p-4 overflow-y-auto"
>

    <!-- MODAL BOX -->
    <div
        class="relative bg-white w-full max-w-[520px]
        rounded-[28px] sm:rounded-[36px]
        px-5 sm:px-8 py-8 sm:py-10 shadow-2xl"
    >

        <!-- CLOSE -->
        <button
            onclick="closeLogoutModal()"
            class="absolute top-5 left-5 text-[#667085] hover:opacity-70 transition"
        >

            <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"

                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"

        </button>

        <!-- CONTENT -->

            <!-- ICON -->

                rounded-[24px]
                bg-[#F3F4F6]
                flex items-center justify-center mb-8"

                    alt="logout"
                    class="w-12 h-12 sm:w-14 sm:h-14"
                >

            </div>

            <!-- TITLE -->
            <h2
                class="text-[20px] 
                font-bold text-[#1F2937]
                leading-relaxed mb-10"
            >
                هل أنت متأكد أنك تريد تسجيل الخروج؟
            </h2>

            <!-- BUTTONS -->
            <div
                class="w-full flex flex-col-reverse sm:flex-row items-stretch sm:items-center justify-center gap-4"
            >
                <!-- CONFIRM -->
                <button
                    class="h-[56px] flex-1 rounded-2xl bg-[#D91E18] text-white text-[16px] font-bold hover:bg-[#BF1611] transition"
                >
                    نعم
                </button>
                 <!-- CANCEL -->
                <button
                    onclick="closeLogoutModal()"
                    class="h-[56px] flex-1 rounded-2xl border-2 border-[#64748B] text-[#64748B] text-[16px] font-bold hover:bg-[#F8FAFC] transition"
                >
                    إلغاء
                </button>
            </div>

        </div>

    </div>

</div>

<script>
function openLogoutModal() {

    const modal = document.getElementById("logoutModal");

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    document.body.style.overflow = "hidden";
}

function closeLogoutModal() {

    const modal = document.getElementById("logoutModal");

    modal.classList.add("hidden");
    modal.classList.remove("flex");

    document.body.style.overflow = "auto";
}

// CLOSE WHEN CLICK OUTSIDE
document
    .getElementById("logoutModal")
    .addEventListener("click", function (e) {

        if (e.target === this) {

            closeLogoutModal();
        }

    });
</script>
