<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Youni</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: rgba(237, 233, 251, 1);
        }

        .form-bg {
            background-color: rgba(136, 108, 232, 1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center overflow-x-hidden">

    <div class="flex flex-col md:flex-row w-full min-h-screen items-center">
        
        <!-- قسم الفورم -->
        <div class="w-full md:w-1/2 min-h-screen form-bg flex items-center justify-center relative order-2 md:order-1 rounded-b-[50px] md:rounded-b-none md:rounded-l-[45%]">
            
            <div class="w-full max-w-md px-8 py-12 text-white z-10">

                <h1 class="text-4xl  font-bold text-center mb-8">
                    الرمز التأكيدي
                </h1>
                
                <form class="space-y-6">

                    <!-- النص -->
                    <div class="text-center">
                        <p class="text-sm leading-relaxed font-medium">
                            ادخل الرمز التأكيدي الذي تم إرساله إلى الرقم
                            <span class="font-medium">+966396******</span>
                        </p>
                    </div>

                    <!-- مربعات الكود -->
                    <div class="flex justify-center gap-4 md:gap-6">

                        <input 
                            type="text"
                            maxlength="1"
                            placeholder="-"
                            class="w-20 h-24 md:w-24 md:h-28 rounded-[28px] bg-[#EBEDEF] text-[#2B2B2B] text-5xl text-center focus:outline-none"
                        >

                        <input 
                            type="text"
                            maxlength="1"
                            placeholder="-"
                            class="w-20 h-24 md:w-24 md:h-28 rounded-[28px] bg-[#EBEDEF] text-[#2B2B2B] text-5xl text-center focus:outline-none"
                        >

                        <input 
                            type="text"
                            maxlength="1"
                            placeholder="-"
                            class="w-20 h-24 md:w-24 md:h-28 rounded-[28px] bg-[#EBEDEF] text-[#2B2B2B] text-5xl text-center focus:outline-none"
                        >

                        <input 
                            type="text"
                            maxlength="1"
                            placeholder="-"
                            class="w-20 h-24 md:w-24 md:h-28 rounded-[28px] bg-[#EBEDEF] text-[#2B2B2B] text-5xl text-center focus:outline-none"
                        >

                    </div>

                    <div class="text-center">
                        <a href="#" class="text-xs underline font-bold">
                            إعادة الارسال 00:59
                        </a>
                    </div>
                    
                   <button 
                        type="button"
                        onclick="window.location.href='reset-password.html'"
                        class="w-full bg-[#ebedef] text-gray-800 font-medium py-4 rounded-xl shadow-lg hover:bg-gray-200 transition-colors mt-8"
                    >
                    التالي
                   </button>

                </form>

            </div>

        </div>

        <!-- قسم اللوجو -->
        <div class="w-full md:w-1/2 flex justify-center items-center p-10 order-1 md:order-2">

            <img 
                src="imgs/logoyouni.png" 
                alt="Youni Logo" 
                class="w-64 md:w-96 object-contain"
            >

        </div>

    </div>

</body>
</html>
