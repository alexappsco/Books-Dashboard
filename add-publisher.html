<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مؤلف جديد - Youni</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="css/author-form.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .header-bg { background: rgba(136, 108, 232, 1); }
        .active-link { background: rgba(136, 108, 232, 0.3); font-weight: 700; }
        .nav-link { font-size: 14px; font-weight: 500; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="header-bg h-16 w-full flex items-center justify-between px-4 md:px-8 fixed top-0 z-[100]">
        <div class="flex items-center"><img src="imgs/logoHeader.png" alt="Youni" class="h-8 md:h-10"></div>
        <div class="flex items-center gap-4 text-white">
            <div class="flex items-center gap-4 border-l pl-4 border-white/20">
                <div class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden"><img src="https://ui-avatars.com/api/?name=User" alt=""></div>
                <span class="hidden md:block text-sm font-medium">اسم المستخدم</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-white"><svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        </div>
    </header>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[80] hidden"></div>

    <div class="flex pt-16">
        <aside id="sidebar" class="w-64 h-[calc(100vh-64px)] fixed right-0 top-16 z-[90] overflow-y-auto transition-transform duration-300 md:translate-x-0 translate-x-full shadow-2xl md:shadow-none bg-white md:bg-[rgba(136,108,232,0.1)]">
            <nav id="sidebar-nav" class="mt-6 px-4 space-y-1"></nav>
        </aside>

        <main class="flex-1 md:mr-64 p-4 md:p-8 min-h-screen w-full">
            <div class="mb-8">
                <h1 class="text-[24px] md:text-[28px] font-bold text-gray-800">إضافة مؤلف جديد</h1>
                <p class="text-gray-500 text-sm mt-1">يرجى تعبئة كافة البيانات المطلوبة لإضافة ملف تعريف المؤلف إلى قاعدة البيانات.</p>
            </div>

            <form class="form-section max-w-3xl">
                <div class="mb-8 pb-8 border-b border-gray-100">
                    <label class="field-label">صورة المؤلف الشخصية</label>
                    <p class="text-xs text-gray-400 mb-4">الصيغ المدعومة: JPG, PNG. الحجم الأقصى 2 ميجا بايت.</p>
                    <div class="flex flex-col sm:flex-row items-center gap-6">
                        <label class="cursor-pointer shrink-0">
                            <input type="file" accept="image/jpeg,image/png" class="hidden">
                            <div class="w-28 h-28 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center bg-gray-50 hover:bg-gray-100 transition overflow-hidden">
                                <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                        </label>
                        <button type="button" class="h-11 px-6 rounded-xl border border-gray-300 text-gray-700 font-semibold text-sm hover:bg-gray-50 transition">رفع صورة جديدة</button>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="field-label">الاسم الكامل للمؤلف <span class="text-red-500">*</span></label>
                        <input type="text" class="field-input" placeholder="مثال: د. نجيب محفوظ">
                    </div>
                    <div>
                        <label class="field-label">البريد الإلكتروني <span class="text-red-500">*</span></label>
                        <input type="email" class="field-input" placeholder="author@example.com" dir="ltr">
                    </div>
                    <div>
                        <label class="field-label">التخصصات / التصنيفات</label>
                        <div class="specialties-wrap" id="specialtiesContainer">
                            <input type="text" id="specialtiesInput" placeholder="أضف تصنيف...">
                        </div>
                    </div>
                    <div>
                        <label class="field-label">السيرة الذاتية / عن المؤلف</label>
                        <textarea rows="6" class="w-full rounded-xl border border-gray-200 p-4 text-[15px] text-right resize-none focus:outline-none focus:border-[#886CE8] focus:ring-2 focus:ring-[#886CE8]/20" placeholder="اكتب نبذة مختصرة عن مسيرة المؤلف وإنجازاته..."></textarea>
                    </div>
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-4 border-t border-gray-100">
                        <div>
                            <p class="field-label mb-1">حالة الملف الشخصي</p>
                            <p class="text-xs text-gray-500">تحديد ما إذا كان ملف المؤلف متاحاً للجمهور حالياً</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer select-none shrink-0">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-[76px] h-[34px] rounded-full bg-[#C4CDD5] peer-checked:bg-[#22C55E] transition-colors duration-300 relative">
                                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-white text-[12px] font-semibold opacity-0 peer-checked:opacity-100 transition-opacity z-10 pointer-events-none">نشط</span>
                                <div class="absolute top-[3px] right-[3px] w-7 h-7 bg-white rounded-full shadow-sm transition-all duration-300 peer-checked:right-[calc(100%-31px)]"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-4 mt-8 pt-6 border-t border-gray-100">
                    <button type="button" class="w-full sm:w-auto h-12 px-10 rounded-xl bg-[#886CE8] text-white font-semibold hover:bg-[#7758E6] transition shadow-md">حفظ المؤلف الجديد</button>
                    <a href="publishers-management.html" class="text-gray-500 font-semibold hover:text-gray-700 transition">إلغاء</a>
                </div>
            </form>
        </main>
    </div>

    <script src="js/publisher-shared.js"></script>
    <script src="js/author-form.js"></script>
    <script src="js/legal-nav.js"></script>
    <script src="js/render-sidebar.js"></script>
    <script>renderSidebar('authors');</script>
</body>
</html>
